<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel — Diaa Store Pixel Verify</title>
    <link rel="stylesheet" href="/assets/style.css">
    <style>
        .admin-layout { display: flex; min-height: 100vh; position: relative; z-index: 1; }
        .sidebar { width: 220px; background: var(--bg-secondary); border-right: 1px solid var(--border); display: flex; flex-direction: column; position: fixed; top: 0; left: 0; bottom: 0; z-index: 10; }
        .sidebar-brand { padding: 16px; border-bottom: 1px solid var(--border); }
        .sidebar-nav { padding: 8px; flex: 1; overflow-y: auto; }
        .sidebar-link { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: var(--radius-sm); color: var(--text-secondary); font-size: 13px; font-weight: 500; text-decoration: none; transition: var(--transition); margin-bottom: 2px; }
        .sidebar-link:hover { color: var(--text-primary); background: rgba(255,255,255,0.03); }
        .sidebar-link.active { color: var(--text-primary); background: rgba(124,58,237,0.08); }
        .admin-main { flex: 1; padding: 20px 28px; margin-left: 220px; }
        .admin-header { display: flex; align-items: center; justify-content: space-between; padding: 0 28px; height: 44px; background: var(--bg-secondary); border-bottom: 1px solid var(--border); position: fixed; top: 0; left: 220px; right: 0; z-index: 9; }
        .header-pills { display: flex; gap: 10px; align-items: center; }
        .admin-main-inner { margin-top: 52px; }
        .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
        .page-header h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
        /* Toggle Switch */
        .toggle-switch { position: relative; display: inline-block; width: 42px; height: 22px; cursor: pointer; }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .toggle-slider { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: #3f3f46; border-radius: 22px; transition: 0.3s; }
        .toggle-slider::before { content: ''; position: absolute; width: 16px; height: 16px; left: 3px; bottom: 3px; background: #71717a; border-radius: 50%; transition: 0.3s; }
        .toggle-switch input:checked + .toggle-slider { background: rgba(16,185,129,0.2); }
        .toggle-switch input:checked + .toggle-slider::before { transform: translateX(20px); background: #34d399; }
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>

    <!-- Login Overlay -->
    <div class="modal-overlay active" id="login-overlay">
        <div class="modal" style="max-width:360px;">
            <div class="modal-header"><h3>Admin Login</h3></div>
            <div class="modal-body">
                <div class="form-group"><label>Username</label><input type="text" class="form-control" id="login-user" placeholder="admin" autocomplete="off"></div>
                <div class="form-group"><label>Password</label><input type="password" class="form-control" id="login-pass" placeholder="••••••••"></div>
                <p id="login-error" style="color:var(--error);font-size:12px;display:none;"></p>
            </div>
            <div class="modal-footer"><button class="btn btn-primary" onclick="adminLogin()" style="width:100%;">Login</button></div>
        </div>
    </div>

    <!-- Admin Layout -->
    <div class="admin-layout" id="admin-layout" style="display:none;">
        <aside class="sidebar">
            <div class="sidebar-brand">
                <div style="display:flex;align-items:center;gap:8px;">
                    <div class="logo-icon" style="width:26px;height:26px;font-size:12px;">⚡</div>
                    <span style="font-size:13px;font-weight:700;color:var(--text-primary);">Admin Panel</span>
                </div>
            </div>
            <nav class="sidebar-nav" id="sidebar-nav"></nav>
            <div style="padding:8px;border-top:1px solid var(--border);">
                <a href="/" class="btn btn-ghost btn-sm" style="width:100%;margin-bottom:4px;font-size:11px;">← Back to Site</a>
                <button class="btn btn-ghost btn-sm" onclick="adminLogout()" style="width:100%;font-size:11px;">Logout</button>
            </div>
        </aside>

        <div style="flex:1;margin-left:220px;">
            <div class="admin-header">
                <div class="header-pills" id="header-balance"></div>
                <div style="font-size:10px;color:var(--text-muted);font-weight:500;">Diaa Store Pixel Verify</div>
            </div>
            <main class="admin-main-inner" id="admin-main"></main>
        </div>
    </div>

    <div class="toast-container" id="toast-container"></div>
    <script src="/assets/background.js"></script>
    <script src="/assets/admin.js"></script>
</body>
</html>
